<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>8Answers | Sign In</title>
    <meta name="description" content="Sign in to your 8Answers account." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500&family=Jaldi:wght@400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./signin.css" />
    <script>
      (() => {
        const enforceDesktopOnlySignin = () => {
          const params = new URLSearchParams(window.location.search || "");
          const hasAuthOrInviteContext =
            Boolean((params.get("auth") || "").trim()) ||
            Boolean((params.get("invite") || "").trim()) ||
            Boolean((params.get("projectId") || "").trim());
          if (window.innerWidth < 770 && !hasAuthOrInviteContext) {
            window.location.replace("./index.html");
          }
        };

        enforceDesktopOnlySignin();
        window.addEventListener("resize", enforceDesktopOnlySignin);
      })();

      (() => {
        const inviteStorageKey = "landman_invite_context";

        const resolveAppBasePath = () => {
          const landingPathEncoded = "/website_8answers%20copy%202/";
          const landingPathDecoded = "/website_8answers copy 2/";
          let path = window.location.pathname || "/";
          const lowerPath = path.toLowerCase();
          const encodedIndex = lowerPath.indexOf(
            landingPathEncoded.toLowerCase(),
          );
          const decodedIndex = lowerPath.indexOf(
            landingPathDecoded.toLowerCase(),
          );
          const segmentIndex =
            encodedIndex >= 0
              ? encodedIndex
              : decodedIndex >= 0
                ? decodedIndex
                : -1;

          if (segmentIndex >= 0) {
            path = path.slice(0, segmentIndex + 1);
          } else if (path.endsWith("/index.html")) {
            path = path.slice(0, -"/index.html".length);
          } else if (!path.endsWith("/")) {
            const lastSlash = path.lastIndexOf("/");
            path = lastSlash >= 0 ? path.slice(0, lastSlash + 1) : "/";
          }

          if (!path.startsWith("/")) path = `/${path}`;
          if (!path.endsWith("/")) path = `${path}/`;
          return path;
        };

        const encodeBase64Url = (value) =>
          btoa(unescape(encodeURIComponent(value)))
            .replace(/\+/g, "-")
            .replace(/\//g, "_")
            .replace(/=+$/g, "");

        const normalizeAuthParam = (value) => {
          let normalized = (value || "").trim();
          if (!normalized) return "";
          for (let i = 0; i < 3; i += 1) {
            if (!normalized.includes("%")) break;
            try {
              const decoded = decodeURIComponent(normalized).trim();
              if (!decoded || decoded === normalized) break;
              normalized = decoded;
            } catch (_) {
              break;
            }
          }
          return normalized;
        };

        const decodeBase64Url = (value) => {
          const normalized = (value || "").trim();
          if (!normalized) return "";
          const padding = "=".repeat((4 - (normalized.length % 4)) % 4);
          const base64 = `${normalized}${padding}`
            .replace(/-/g, "+")
            .replace(/_/g, "/");
          return decodeURIComponent(escape(atob(base64)));
        };

        const parseInviteToken = (token) => {
          const rawToken = (token || "").trim();
          if (!rawToken) return null;
          try {
            const decoded = decodeBase64Url(rawToken);
            const parsed = JSON.parse(decoded);
            if (!parsed || typeof parsed !== "object") return null;
            const projectId = String(parsed.projectId || "").trim();
            if (!projectId) return null;
            const projectRole = String(parsed.projectRole || "partner").trim();
            const projectName = String(parsed.projectName || "").trim();
            return {
              projectId,
              projectRole: projectRole || "partner",
              ...(projectName ? { projectName } : {}),
            };
          } catch (_) {
            return null;
          }
        };

        const resolveInviteContext = () => {
          const params = new URLSearchParams(window.location.search || "");
          const inviteToken =
            (params.get("inv") || params.get("inviteToken") || "").trim();
          const tokenContext = parseInviteToken(inviteToken);
          const projectId = (
            params.get("projectId") ||
            (tokenContext ? tokenContext.projectId : "") ||
            ""
          ).trim();
          const projectRole = (
            params.get("projectRole") ||
            (tokenContext ? tokenContext.projectRole : "") ||
            ""
          ).trim();
          const projectName = (
            params.get("projectName") ||
            (tokenContext ? tokenContext.projectName : "") ||
            ""
          ).trim();

          if (projectId) {
            const context = {
              projectId,
              projectRole: projectRole || "partner",
              ...(projectName ? { projectName } : {}),
            };
            try {
              window.localStorage.setItem(inviteStorageKey, JSON.stringify(context));
            } catch (_) {
              // Ignore storage failures.
            }
            return context;
          }

          try {
            const raw = window.localStorage.getItem(inviteStorageKey);
            if (!raw) return null;
            const parsed = JSON.parse(raw);
            if (!parsed || typeof parsed !== "object") return null;
            const storedProjectId = String(parsed.projectId || "").trim();
            if (!storedProjectId) return null;
            const storedProjectRole = String(parsed.projectRole || "partner").trim();
            const storedProjectName = String(parsed.projectName || "").trim();
            return {
              projectId: storedProjectId,
              projectRole: storedProjectRole || "partner",
              ...(storedProjectName ? { projectName: storedProjectName } : {}),
            };
          } catch (_) {
            return null;
          }
        };

        const composeAuthValue = (context) => {
          if (!context || !context.projectId) return "google";
          const payload = {
            projectId: context.projectId,
            projectRole: context.projectRole || "partner",
            ...(context.projectName ? { projectName: context.projectName } : {}),
          };
          return `google:${encodeBase64Url(JSON.stringify(payload))}`;
        };

        const bindGoogleButton = () => {
          const button = document.getElementById("continue-with-google");
          const consentCheckbox = document.getElementById("consent-checkbox");
          if (!button) return;

          const updateButtonState = () => {
            if (!consentCheckbox) {
              button.disabled = false;
              return;
            }
            button.disabled = !consentCheckbox.checked;
          };

          updateButtonState();
          if (consentCheckbox) {
            consentCheckbox.addEventListener("change", updateButtonState);
          }

          button.addEventListener("click", () => {
            if (button.disabled) return;
            const authUrl = new URL(
              resolveAppBasePath(),
              window.location.origin,
            );
            const currentParams = new URLSearchParams(window.location.search || "");
            const inviteContext = resolveInviteContext();

            if (inviteContext && inviteContext.projectId) {
              authUrl.searchParams.set("invite", "1");
              authUrl.searchParams.set("projectId", inviteContext.projectId);
              if (inviteContext.projectRole) {
                authUrl.searchParams.set("projectRole", inviteContext.projectRole);
              }
              if (inviteContext.projectName) {
                authUrl.searchParams.set("projectName", inviteContext.projectName);
              }
            }
            const currentAuth = normalizeAuthParam(currentParams.get("auth"));
            if (currentAuth.toLowerCase().startsWith("google:")) {
              authUrl.searchParams.set("auth", currentAuth);
            } else {
              authUrl.searchParams.set("auth", composeAuthValue(inviteContext));
            }
            window.location.assign(authUrl.toString());
          });
        };

        const canonicalizeSigninRoute = () => {
          if (window.location.protocol === "file:") return;
          const currentPath = window.location.pathname || "/";
          const lowerPath = currentPath.toLowerCase();
          const encodedSigninPath = "/website_8answers%20copy%202/signin.html";
          const decodedSigninPath = "/website_8answers copy 2/signin.html";
          const isLegacySigninPath =
            lowerPath.endsWith(encodedSigninPath.toLowerCase()) ||
            lowerPath.endsWith(decodedSigninPath.toLowerCase());
          if (!isLegacySigninPath) return;

          const pageUrl = new URL(window.location.href);
          const relativeLinks = document.querySelectorAll('a[href^="./"]');
          relativeLinks.forEach((link) => {
            const href = (link.getAttribute("href") || "").trim();
            if (!href) return;
            try {
              const targetUrl = new URL(href, pageUrl);
              link.setAttribute("href", targetUrl.toString());
            } catch (_) {
              // Ignore malformed hrefs.
            }
          });

          try {
            const canonicalUrl = new URL(window.location.href);
            canonicalUrl.pathname = "/Signin";
            canonicalUrl.hash = "";
            window.history.replaceState(
              window.history.state,
              "",
              canonicalUrl.toString(),
            );
          } catch (_) {
            // Ignore history API failures.
          }
        };

        const initializeSigninPage = () => {
          bindGoogleButton();
          canonicalizeSigninRoute();
        };

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", initializeSigninPage);
        } else {
          initializeSigninPage();
        }
      })();
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a href="./index.html" class="brand" aria-label="8Answers home">
          <span class="brand-icon-wrap">
            <img
              src="./assets/d8ea7a77-7511-429a-8bdd-89cb19f1ab47.svg"
              alt="8Answers logo mark"
              class="brand-icon"
            />
          </span>
          <img
            src="./assets/f83cf577-9339-4aaa-aa50-17dfa5efcc0b.svg"
            alt="8Answers"
            class="brand-word"
          />
        </a>
      </div>
    </header>

    <main class="signin-main">
      <section class="signin-panel">
        <div class="signin-card">
          <h1>Sign In</h1>
          <div class="terms-block">
            <label class="consent-row" for="consent-checkbox">
              <input type="checkbox" id="consent-checkbox" />
              <span class="consent-copy">
                I agree to the <a href="./terms.html">Terms &amp; Conditions</a> and
                <a href="./privacy.html">Privacy Policy</a>, consent to the processing of my
                personal data as described therein, and confirm that I am 18 years or older or
                using this platform with parental/guardian consent.
              </span>
            </label>
          </div>

          <button type="button" class="btn-google" id="continue-with-google" disabled>
            <img
              src="./assets/6b4e9b37-09de-422d-b91f-3116395884de.svg"
              alt=""
              aria-hidden="true"
            />
            <span>Continue with Google</span>
          </button>

          <div class="divider" aria-hidden="true">
            <span></span>
            <strong>or</strong>
            <span></span>
          </div>

          <p class="more-options">More sign-in options coming soon</p>
        </div>

        <p class="signin-footer">Copyright © 2025 8Answers - All Rights Reserved.</p>
      </section>

      <aside class="illustration-panel" aria-hidden="true">
        <img
          src="./assets/1d2db8cd-7802-4fdd-9318-8fab7cd853ce.png"
          alt=""
          class="illustration"
        />
      </aside>
    </main>
  </body>
</html>
