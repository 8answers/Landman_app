<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>8Answers | Sign Up</title>
    <meta name="description" content="Create your free 8Answers account." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Jaldi:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./signup.css" />
    <script>
      (() => {
        const signInUrl = new URL("./signin.html", window.location.href);
        const params = new URLSearchParams(window.location.search || "");
        ["access_token", "refresh_token", "id_token", "code", "state"].forEach(
          (key) => params.delete(key),
        );
        const sanitizedSearch = params.toString();
        signInUrl.search = sanitizedSearch ? `?${sanitizedSearch}` : "";
        signInUrl.hash = "";
        window.location.replace(signInUrl.toString());
      })();

      (() => {
        const enforceDesktopOnly = () => {
          if (window.innerWidth < 770) {
            const homeUrl = new URL("./index.html", window.location.href);
            const params = new URLSearchParams(window.location.search || "");
            ["access_token", "refresh_token", "id_token", "code", "state"].forEach(
              (key) => params.delete(key),
            );
            const sanitizedSearch = params.toString();
            homeUrl.search = sanitizedSearch ? `?${sanitizedSearch}` : "";
            homeUrl.hash = "";
            window.location.replace(homeUrl.toString());
          }
        };
        enforceDesktopOnly();
        window.addEventListener("resize", enforceDesktopOnly);
      })();
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a href="./index.html" class="brand" aria-label="8Answers home">
          <span class="brand-icon-wrap">
            <img
              src="./assets/d8ea7a77-7511-429a-8bdd-89cb19f1ab47.svg"
              alt="8Answers logo mark"
              class="brand-icon"
            />
          </span>
          <img
            src="./assets/f83cf577-9339-4aaa-aa50-17dfa5efcc0b.svg"
            alt="8Answers"
            class="brand-word"
          />
        </a>
        <a class="btn-top" href="./signin.html">Sign in</a>
      </div>
    </header>

    <main class="signup-main">
      <section class="signup-panel">
        <div class="signup-card">
          <h1>Start with your free account today.</h1>

          <label class="field-label" for="signup-email">Email Address</label>
          <input id="signup-email" type="email" placeholder="Enter Email Address" />

          <button type="button" class="btn-continue">Continue</button>

          <div class="muted-group">
            <label class="field-label" for="otp-1">OTP</label>
            <div class="otp-row">
              <input id="otp-1" type="text" maxlength="1" value="0" readonly />
              <input type="text" maxlength="1" value="0" readonly />
              <input type="text" maxlength="1" value="0" readonly />
              <input type="text" maxlength="1" value="0" readonly />
              <input type="text" maxlength="1" value="0" readonly />
              <input type="text" maxlength="1" value="0" readonly />
            </div>
          </div>

          <div class="muted-group">
            <label class="field-label" for="new-password">New Password</label>
            <input id="new-password" type="password" placeholder="Enter new password" readonly />
            <ul class="password-rules">
              <li>Minimum 8 Character</li>
              <li>Upper &amp; lower case letters</li>
              <li>A symbol (Special Character)</li>
            </ul>
          </div>

          <div class="muted-group">
            <label class="field-label" for="confirm-password">Confirm Password</label>
            <input
              id="confirm-password"
              type="password"
              placeholder="Re-enter new password"
              readonly
            />
          </div>

          <div class="terms-block">
            <p>By continuing, you agree to our</p>
            <a href="./terms.html">Terms &amp; Conditions and Privacy Policy.</a>
          </div>
        </div>

        <p class="signup-footer">Copyright © 2025 8Answers - All Rights Reserved.</p>
      </section>

      <aside class="illustration-panel" aria-hidden="true">
        <img
          src="./assets/cebde693-948a-48db-8e31-02bc71632975.png"
          alt=""
          class="illustration"
        />
      </aside>
    </main>
  </body>
</html>
