  <script>
    // Ultra-strict zoom prevention (Figma-style)
    (function() {
      'use strict';
      
      // Prevent all zoom attempts
      function preventZoom(e) {
        if (e.ctrlKey || e.metaKey) {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
      }

      // Prevent wheel zoom
      document.addEventListener('wheel', preventZoom, { passive: false, capture: true });
      
      // Prevent keyboard zoom
      document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && 
            (e.key === '+' || e.key === '=' || e.key === '-' || e.key === '_' || 
             e.key === '0' || e.keyCode === 187 || e.keyCode === 189 || e.keyCode === 48)) {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
      }, { passive: false, capture: true });

      // Prevent pinch zoom
      document.addEventListener('gesturestart', function(e) {
        e.preventDefault();
        e.stopPropagation();
      }, { passive: false, capture: true });

      document.addEventListener('gesturechange', function(e) {
        e.preventDefault();
        e.stopPropagation();
      }, { passive: false, capture: true });

      document.addEventListener('gestureend', function(e) {
        e.preventDefault();
        e.stopPropagation();
      }, { passive: false, capture: true });

      // Prevent touch-based zoom
      let lastTouchEnd = 0;
      document.addEventListener('touchstart', function(e) {
        if (e.touches.length > 1) {
          e.preventDefault();
          e.stopPropagation();
        }
      }, { passive: false, capture: true });

      document.addEventListener('touchmove', function(e) {
        if (e.touches.length > 1) {
          e.preventDefault();
          e.stopPropagation();
        }
      }, { passive: false, capture: true });

      document.addEventListener('touchend', function(e) {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) {
          e.preventDefault();
          e.stopPropagation();
        }
        lastTouchEnd = now;
      }, { passive: false, capture: true });

      // Force zoom to 1.0 continuously
      let checkInterval = setInterval(function() {
        if (document.body && document.body.style.zoom && document.body.style.zoom !== '1') {
          document.body.style.zoom = '1';
        }
      }, 100);

      // Disable zoom via CSS while allowing scrolling
      document.addEventListener('DOMContentLoaded', function() {
        const style = document.createElement('style');
        style.textContent = `
          html, body, flt-glass-pane {
            touch-action: manipulation !important;
            -ms-touch-action: manipulation !important;
            user-zoom: fixed !important;
            -webkit-user-zoom: fixed !important;
          }
        `;
        document.head.appendChild(style);
      });

    })();
  </script>

  <div id="app-loading" class="loading">
    <div class="loader"></div>
  </div>
  <script>
    window.addEventListener('load', function(ev) {
      const forceHideLoading = setTimeout(function() {
        const loading = document.getElementById('app-loading');
        if (loading) {
          loading.remove();
        }
      }, 15000);

      // Prevent stale startup pages by clearing old Flutter service workers/caches.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          registrations.forEach(function(registration) {
            registration.unregister();
          });
        });
      }
      if ('caches' in window) {
        caches.keys().then(function(keys) {
          keys.forEach(function(key) {
            caches.delete(key);
          });
        });
      }

      _flutter.loader.load({
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
            clearTimeout(forceHideLoading);
            const loading = document.getElementById('app-loading');
            if (loading) {
              loading.remove();
            }
          });
        }
      });
    });
  </script>
